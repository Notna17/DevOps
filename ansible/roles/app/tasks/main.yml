- name: Ensure app system user exists
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Install app dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - git
    state: present

- name: Create app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_config_dir }}"

- name: Clone application repository
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_repo_ref }}"
    force: true

- name: Set ownership for application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: true

- name: Create virtualenv and install requirements
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/app/requirements.txt"
    virtualenv: "{{ app_virtualenv }}"
    virtualenv_command: python3 -m venv

- name: Render application config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ app_config_dir }}/config.toml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0640"
  notify: Restart mywebapp

- name: Install systemd service unit
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/mywebapp.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart mywebapp

- name: Install systemd socket unit
  ansible.builtin.template:
    src: mywebapp.socket.j2
    dest: /etc/systemd/system/mywebapp.socket
    mode: "0644"
  notify:
    - Reload systemd
    - Restart mywebapp socket

- name: Ensure mywebapp socket is enabled
  ansible.builtin.systemd:
    name: mywebapp.socket
    state: started
    enabled: true

- name: Ensure mywebapp service is enabled
  ansible.builtin.systemd:
    name: mywebapp.service
    state: started
    enabled: true

- name: Run database migration
  ansible.builtin.command: "{{ app_virtualenv }}/bin/python {{ app_dir }}/app/migrate.py"
  become_user: "{{ app_user }}"

- name: Allow app access from nginx
  ansible.builtin.command: "ufw allow from {{ nginx_host }} to any port {{ app_listen_port }} proto tcp"
  changed_when: true
