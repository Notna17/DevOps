#cloud-config
hostname: ${hostname}
manage_etc_hosts: true

users:
  - default
  - name: student
    groups: ["sudo"]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_authorized_key}

ssh_pwauth: false
disable_root: true

package_update: true
packages:
  - qemu-guest-agent

runcmd:
  - systemctl enable --now qemu-guest-agent
